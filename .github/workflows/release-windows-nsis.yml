name: Release Windows NSIS

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build (Tauri + NSIS)
        run: pnpm tauri build

      - name: List build artifacts
        run: |
          if (Test-Path "src-tauri/target/release/bundle/nsis") {
            Get-ChildItem -Path "src-tauri/target/release/bundle/nsis" -Recurse | Select-Object FullName
          } else {
            Write-Host "NSIS bundle directory not found!"
            Get-ChildItem -Path "src-tauri/target/release/bundle" -Recurse -ErrorAction SilentlyContinue | Select-Object FullName
          }

      - name: Create GitHub Release and upload NSIS installer
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          files: src-tauri/target/release/bundle/nsis/*.exe
          fail_on_unmatched_files: true

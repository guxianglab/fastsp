name: Build Windows NSIS

on:
  # Disabled - only use release workflow for tag-based releases
  # push:
  #   branches: [ main ]
  # pull_request:
  workflow_dispatch:  # Keep it available for manual trigger if needed

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build (Tauri + NSIS)
        run: pnpm tauri build

      - name: Upload NSIS installer only
        uses: actions/upload-artifact@v4
        with:
          name: windows-nsis-installer
          path: src-tauri/target/release/bundle/nsis/*.exe
